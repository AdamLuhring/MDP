<script type="module">
import erf from 'https://cdn.jsdelivr.net/gh/stdlib-js/math-base-special-erf@esm/index.mjs';
const TAU = Math.PI*2;
function normalDistribution(){
    return Math.sqrt(-2*Math.log(Math.random()))*Math.cos(TAU*Math.random());
}
function gammaDistribution(shape, scale) {
    if (shape < 1) {
        return gammaRandom(shape + 1, scale) * Math.pow(Math.random(), 1 / shape);
    }
    const d = shape - 1/3;
    const c = 1 / Math.sqrt(9 * d);
    while (true) {
        let x = standardNormal();
        let v = Math.pow(1 + c * x, 3);
        if (v > 0) {
            const u = Math.random();
            if (u < 1 - 0.0331 * Math.pow(x, 4)) {
                return d * v * scale;
            }
            if (Math.log(u) < 0.5 * Math.pow(x, 2) + d * (1 - v + Math.log(v))) {
                return d * v * scale;
            }
        }
    }
}
function getDetailedType(value) {
    if(value === null){return 'null'}
    if(Array.isArray(value)){
        if(Array.isArray(value[0])){
            return 'array2D';
        }
        return 'array1D';
    }
    return typeof value;
}
function topologicalSort(boxes, connections) {
  const adj = new Map();
  const indegree = new Map();
  for (let i = 0; i < boxes.length; i++) {
    adj.set(i, new Set());
    indegree.set(i, 0);
  }
  connections.forEach(conn => {
    const fromIndex = conn.from.box;
    const toIndex = conn.to.box;
    if (fromIndex < 0 || fromIndex >= boxes.length) {
      return;
    }
    if (toIndex < 0 || toIndex >= boxes.length) {
      return;
    }
    if (!adj.get(fromIndex).has(toIndex)) {
      adj.get(fromIndex).add(toIndex);
      indegree.set(toIndex, indegree.get(toIndex) + 1);
    }
  });
  const queue = [];
  const sorted = [];
  for (let [idx, degree] of indegree) {
    if (degree === 0) {
      queue.push(idx);
    }
  }
  if (queue.length === 0 && boxes.length > 0) {
    let minDegree = Infinity;
    let startNode = -1;
    for (let [idx, degree] of indegree) {
      if (degree < minDegree) {
        minDegree = degree;
        startNode = idx;
      }
    }
    if (startNode !== -1) {
      queue.push(startNode);
    }
  }
  while (queue.length > 0) {
    const current = queue.shift();
    sorted.push(current);
    const neighbors = adj.get(current);
    if (neighbors && neighbors.size > 0) {
      for (let neighbor of neighbors) {
        const newDegree = indegree.get(neighbor) - 1;
        indegree.set(neighbor, newDegree);
        if (newDegree === 0) {
          queue.push(neighbor);
        }
      }
    }
  }
  if (sorted.length !== boxes.length) {
    const unsorted = [];
    for (let i = 0; i < boxes.length; i++) {
      if (!sorted.includes(i)) {
        unsorted.push(i);
      }
    }
    return sorted;
  }
  return sorted;
}
function isDirectedAcyclicGraphBoxConnection(boxes, connections) {
    const graph = {};
    const visited = new Set();
    const recursionStack = new Set();
    
    // Initialize graph
    for (const box of boxes) {
        graph[box] = [];
    }
    
    // Build adjacency list
    for (const conn of connections) {
        const from = conn.from.box;
        const to = conn.to.box;
        
        // Ensure both nodes exist in graph
        if (!graph[from]) graph[from] = [];
        if (!graph[to]) graph[to] = [];
        
        graph[from].push(to);
    }
    
    function dfs(node) {
        if (recursionStack.has(node)) return false;
        if (visited.has(node)) return true;
        
        visited.add(node);
        recursionStack.add(node);
        
        const neighbors = graph[node] || [];
        for (const neighbor of neighbors) {
            if (!dfs(neighbor)) return false;
        }
        
        recursionStack.delete(node);
        return true;
    }
    
    // Get all unique nodes from boxes and connections
    const allNodes = new Set(boxes);
    for (const conn of connections) {
        allNodes.add(conn.from.box);
        allNodes.add(conn.to.box);
    }
    
    for (const node of allNodes) {
        if (!visited.has(node)) {
            if (!dfs(node)) return false;
        }
    }
    
    return true;
}
function tryToAddRemoveConnection(fromBox,fromOutlet,toBox,toInlet){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    var matchingConnection = connection.findIndex(conn => conn.from.box === fromBox && conn.to.box === toBox && conn.from.outlet === fromOutlet && conn.to.inlet === toInlet);
    if(matchingConnection>-1){
        box[toBox].parameterSource[toInlet] = {kind:"specified"};
        box[toBox].parameterValue[toInlet] = structuredClone(boxDefault.parameterValue[box[toBox].kind][toInlet]);
        connection.splice(matchingConnection,1);
    }
    else{
        connection.push({from:{box:fromBox,outlet:fromOutlet},to:{box:toBox,inlet:toInlet}});
        if(!isDirectedAcyclicGraphBoxConnection(box,connection)){
            connection.pop()
        }
        else{
            box[toBox].parameterSource[toInlet] = {kind:"derived",from:{box:fromBox,outlet:fromOutlet}};
        };
    }
    programState.latestTopologicalSort = topologicalSort(box,connection);
    calculateWholeGraph();
}
function isTextInputValid(text, parameterNames, dataSignature) {
    const lines = text.trim().split('\n');
    let lineIndex = 0;
    if (lines[lineIndex]!=="PARAMETERS:") {
        return false;
    }
    lineIndex++;
    const expectedParamLine = parameterNames.join(';');
    if (lines[lineIndex] !== expectedParamLine) {
        return false;
    }
    lineIndex++;
    const paramValues = lines[lineIndex].split(';');
    if (paramValues.length !== parameterNames.length) {
        return false;
    }
    lineIndex++;
    if (lines[lineIndex] !== "DATA:") {
        return false;
    }
    lineIndex++;
    const dataLines = lines.slice(lineIndex);
    for (let i = 0; i < dataLines.length; i++) {
        const line = dataLines[i].trim();
        if (line === "") continue;
        const values = line.split(',');
        if (values.length !== dataSignature.length) {
            return false;
        }
        let rowValid = true;
        for (let j = 0; j < dataSignature.length; j++) {
            const type = dataSignature[j];
            const value = values[j].trim();
            switch(type) {
                case 'string':
                    break;
                case 'float':
                    const floatVal = parseFloat(value);
                    if (isNaN(floatVal)) {
                        return false;
                    }
                    break;
                case 'integer':
                case 'int':
                    const intVal = parseInt(value, 10);
                    if (isNaN(intVal) || !/^-?\d+$/.test(value)) {
                        return false;
                    }
                    break;
            }
        }
    }
    return true;
}
function calculateWholeGraph(){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    programState.latestTopologicalSort.forEach(boxIndex => {
        // Iterate through parameterSource indices
        for (let inletIdx = 0; inletIdx < box[boxIndex].parameterSource.length; inletIdx++) {
            const src = box[boxIndex].parameterSource[inletIdx];
            if (src.kind === "derived") {
                // Make sure the source box has data at that outlet
                if (box[src.from.box] && box[src.from.box].data && box[src.from.box].data[src.from.outlet] !== undefined) {
                    box[boxIndex].parameterValue[inletIdx] = structuredClone(box[src.from.box].data[src.from.outlet]);
                }
            }
        }
        box[boxIndex].generateDataFromParameters();
    });
}
class Box{
    generateDataFromParameters(){
        switch(this.kind){
            case "data":
                this.data = [[1,2,3],[4,5,6],[7,8,9]];
                break;
            case "fill":
                this.data = [];
                for(var fillRow=0;fillRow<this.parameterValue[1];fillRow++){
                    this.data[fillRow] = [];
                    for(var fillColumn=0;fillColumn<this.parameterValue[0];fillColumn++){
                        this.data[fillRow][fillColumn] = this.parameterValue[2];
                    }
                }
                break;
            case "gaussian":
                this.data = [];
                for(var fillRow=0;fillRow<this.parameterValue[1];fillRow++){
                    this.data[fillRow] = [];
                    for(var fillColumn=0;fillColumn<this.parameterValue[0];fillColumn++){
                        this.data[fillRow][fillColumn] = normalDistribution()*this.parameterValue[3]+this.parameterValue[2];
                    }
                }
                break;
            case "hadamardMultiply":
                this.data = [];
                break;
            case "identity":
                this.data = [];
                for(var fillRow=0;fillRow<this.parameterValue[1];fillRow++){
                    this.data[fillRow] = [];
                    for(var fillColumn=0;fillColumn<this.parameterValue[0];fillColumn++){
                        this.data[fillRow][fillColumn] = (fillRow===fillColumn) ? 1 : 0;
                    }
                }
                break;
            case "plus":
                var firstAddendType = getDetailedType(this.parameterValue[0]);
                var secondAddendType = getDetailedType(this.parameterValue[1]);
                switch(firstAddendType){
                    case "number":
                        switch(secondAddendType){
                            case "number":
                                this.data = this.parameterValue[0]+this.parameterValue[1];
                                break;
                        }
                        break;
                    case "array2D":
                        switch(secondAddendType){
                            case "array2D":
                                this.data = [];
                                for(var a=0;a<this.parameterValue[0].length;a++){
                                    this.data[a] = [];
                                    for(var b=0;b<this.parameterValue[0][a].length;b++){
                                        this.data[a][b] = this.parameterValue[0][a][b]+this.parameterValue[1][a][b];
                                    }
                                }
                                break;
                        }
                        break;
                }
                break;
            case "uniform":
                var range = this.parameterValue[3]-this.parameterValue[2];
                this.data = [];
                for(var fillRow=0;fillRow<this.parameterValue[1];fillRow++){
                    this.data[fillRow] = [];
                    for(var fillColumn=0;fillColumn<this.parameterValue[0];fillColumn++){
                        this.data[fillRow][fillColumn] = Math.random()*range+this.parameterValue[2];
                    }
                }
                break;
            case "zero":
                this.data = [];
                for(var fillRow=0;fillRow<this.parameterValue[1];fillRow++){
                    this.data[fillRow] = [];
                    for(var fillColumn=0;fillColumn<this.parameterValue[0];fillColumn++){
                        this.data[fillRow][fillColumn] = 0;
                    }
                }
                break;
            default:
                this.parameterName = null;
                this.parameterValue = null;
                this.data = [0];
                break;
        }
        //This is for the temporary state of affairs that every box happens to have one outlet
        //When there can be multiple outlets, that will need to be handled within the switch
        this.data = [this.data];
    }
    constructor(x,y,kind){
        this.x = x;
        this.y = y;
        this.kind = kind;
        this.subgraph = null;
        this.selected = false;
        this.inletDivide = [];
        this.inletCenter = [];
        this.outletDivide = [];
        this.outletCenter = [programState.screenDim.halfTile];
        this.outletCount = 1;
        if(typeof this.kind === "string"){
            this.parameterName = structuredClone(boxDefault.parameterName[this.kind]);
            this.parameterValue = structuredClone(boxDefault.parameterValue[this.kind]);
            this.parameterSource = [];
            this.inletCount = this.parameterName.length;
            for(var z=0;z<this.inletCount;z++){
                this.parameterSource[z] = {kind:"specified"};
            }
        }
        else{
            this.parameterName = null;
            this.parameterValue = null;
            this.parameterSource = [];
            this.inletCount = programState.graphRegistry.get(this.kind).inputPorts.length;
        }
        this.generateDataFromParameters();
        var inletHeight = programState.screenDim.menuTile/this.inletCount;
        var halfInletHeight = inletHeight/2;
        for(var z=0;z<this.inletCount;z++){
            this.inletCenter.push(inletHeight*z+halfInletHeight);
        }
        for(var z=1;z<this.inletCount;z++){
            this.inletDivide.push(inletHeight*z);
        }
    }
}
class Graph{
    randomSymbol(){
        this.symbol = String.fromCodePoint(Math.floor(Math.random()*65536));
    }
    constructor(id,name) {
        this.id = id;
        this.name = name;
        this.box = [];
        this.connection = [];
        this.inputPorts = [];
        this.outputPorts = [];
        this.randomSymbol();
    }
}
function isInRectangle(xTest,yTest,xBoundA,yBoundA,xBoundB,yBoundB){
    return ((xTest>Math.min(xBoundA,xBoundB))&&(xTest<Math.max(xBoundA,xBoundB))&&(yTest>Math.min(yBoundA,yBoundB))&&(Math.max(yBoundA,yBoundB)));
}
function processToIcon(processIn){
    if(typeof processIn === 'number'){
        const graph = programState.graphRegistry.get(processIn);
        if(graph && graph.symbol){
            return graph.symbol;
        }
        return "?";
    }
    switch(processIn){
        case "balance": return "\u2696";
        case "beta": return "\u{3B2}";
        case "connection": return "\u{1F73A}";
        case "conversion": return "\u33A0";
        case "convolution": return "\u2605";
        case "data": return "\u2637";
        case "difference": return "\u2206";
        case "distribution": return "\u29EE";
        case "fill": return "\u23F9";
        case "gaussian": return "gs";
        case "graph": return "\u23E7";
        case "greaterOrEqual": return "\u2265";
        case "hadamardMultiply": return "\u2299";
        case "identity": return "1";
        case "join": return "\u269E";
        case "math": return "\u03A3";
        case "matrix": return "\u25A6";
        case "one": return "1";
        case "ornament": return "\u269C";
        case "plus": return "+";
        case "randomize": return "\u2684";
        case "selection": return "\u2B1A";
        case "set": return "\u2208";
        case "sieve": return "\u25D4";
        case "split": return "\u269F";
        case "uniform": return "un";
        case "userProcess": return "\u270D";
        case "x": return "\u2715";
        case "zero": return "0";
        default: return "FUCK";
    }
}
function clearCanvas(){
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,cnvs.clientWidth,cnvs.clientHeight);
}
function drawTextCentered(stringToDraw,centerX,centerY){
    var textMetric = ctx.measureText(stringToDraw);
    var halfWidth = (textMetric.actualBoundingBoxLeft-textMetric.actualBoundingBoxRight)/2;
    var halfHeight = (textMetric.actualBoundingBoxAscent-textMetric.actualBoundingBoxDescent)/2;
    ctx.fillText(stringToDraw,centerX+halfWidth,centerY+halfHeight);
}
function drawBraceletEditor(stateObject){
    clearCanvas();
    ctx.strokeStyle = "black";
    ctx.beginPath();
    ctx.arc(cnvs.width/2,cnvs.height/2,100,0,TAU);
    ctx.stroke();
}
function drawBoxEditor(stateObject){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    clearCanvas();
    const menuTileNum = 20;
    var menuTileSize = cnvs.clientWidth/menuTileNum;
    var menuTileHalf = menuTileSize/2;
    ctx.strokeStyle = "black";
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(0,menuTileSize);
    ctx.lineTo(menuTileSize*menuHierarchy["main"].length,menuTileSize);
    for(var a=0;a<menuHierarchy["main"].length;a++){
        ctx.moveTo((a+1)*menuTileSize,0);
        ctx.lineTo((a+1)*menuTileSize,menuTileSize);
    }
    ctx.stroke();
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "24px Courier New";
    for(var a=0;a<menuHierarchy["main"].length;a++){
        drawTextCentered(processToIcon(menuHierarchy["main"][a]),a*menuTileSize+menuTileHalf,menuTileHalf);
    }
    if(programState.submenu!="none"){
        ctx.beginPath();
        for(var a=0;a<menuHierarchy[programState.submenu].length;a++){
            ctx.moveTo((a+1)*menuTileSize,menuTileSize);
            ctx.lineTo((a+1)*menuTileSize,menuTileSize*2);
            drawTextCentered(processToIcon(menuHierarchy[programState.submenu][a]),a*menuTileSize+menuTileHalf,menuTileSize+menuTileHalf);
        }
        ctx.moveTo(0,menuTileSize*2);
        ctx.lineTo(menuHierarchy[programState.submenu].length*menuTileSize,menuTileSize*2);
        ctx.stroke();
    }
    ctx.beginPath();
    var arrowLength = menuTileHalf/2;
    for(var a=0;a<connection.length;a++){
        var fromBox = box[connection[a].from.box];
        var toBox = box[connection[a].to.box];
        var fromOutlet = connection[a].from.outlet;
        var toInlet = connection[a].to.inlet;
        var start = {x:fromBox.x+menuTileHalf,y:fromBox.y-menuTileHalf+fromBox.outletCenter[fromOutlet]};
        var end = {x:toBox.x-menuTileHalf,y:toBox.y-menuTileHalf+toBox.inletCenter[toInlet]};
        var xDif = end.x-start.x;
        var yDif = end.y-start.y;
        var lineDirection = Math.atan2(yDif,xDif);
        var midpoint = {x:xDif/2+start.x,y:yDif/2+start.y};
        ctx.moveTo(start.x,start.y);
        ctx.lineTo(end.x,end.y);
        ctx.moveTo(midpoint.x,midpoint.y);
        ctx.lineTo(midpoint.x+Math.cos(lineDirection+Math.PI*2/3)*arrowLength,midpoint.y+Math.sin(lineDirection+Math.PI*2/3)*arrowLength);
        ctx.moveTo(midpoint.x,midpoint.y);
        ctx.lineTo(midpoint.x+Math.cos(lineDirection-Math.PI*2/3)*arrowLength,midpoint.y+Math.sin(lineDirection-Math.PI*2/3)*arrowLength);
    }
    ctx.stroke();
    var xletWidth = programState.screenDim.xletWidth;
    for(var a=0;a<box.length;a++){
        if(box[a].selected){
            ctx.setLineDash([5, 3])
        }
        else{
            ctx.setLineDash([]);
        }
        ctx.fillStyle = "white";
        ctx.fillRect(box[a].x-menuTileHalf,box[a].y-menuTileHalf,menuTileSize,menuTileSize);
        ctx.fillStyle = "black";
        ctx.strokeRect(box[a].x-menuTileHalf,box[a].y-menuTileHalf,menuTileSize,menuTileSize);
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(box[a].x+menuTileHalf-xletWidth,box[a].y-menuTileHalf);
        ctx.lineTo(box[a].x+menuTileHalf-xletWidth,box[a].y+menuTileHalf);
        if(box[a].inletCount>0){
            ctx.moveTo(box[a].x-menuTileHalf+xletWidth,box[a].y-menuTileHalf);
            ctx.lineTo(box[a].x-menuTileHalf+xletWidth,box[a].y+menuTileHalf);
            var inletHeight = programState.screenDim.menuTile/box[a].inletCount;
            for(var b=1;b<box[a].inletCount;b++){
                ctx.moveTo(box[a].x-menuTileHalf,inletHeight*b+box[a].y-menuTileHalf);
                ctx.lineTo(box[a].x-menuTileHalf+xletWidth,inletHeight*b+box[a].y-menuTileHalf);
            }
        }
        else{
            ctx.font = "12px Courier New";
            ctx.fillText("D",-0.75*menuTileHalf+box[a].x,box[a].y);
        }
        var outletHeight = programState.screenDim.menuTile/box[a].outletCount;
        for(var b=1;b<box[a].outletCount;b++){
            ctx.moveTo(box[a].x+menuTileHalf,outletHeight*b+box[a].y-menuTileHalf);
            ctx.lineTo(box[a].x+menuTileHalf-xletWidth,outletHeight*b+box[a].y-menuTileHalf);
        }
        ctx.stroke();
        ctx.font = "24px Courier New";
        drawTextCentered(processToIcon(box[a].kind),box[a].x,box[a].y);
    }
}
function redraw(stateObject){
    clearCanvas();
    switch(stateObject.screenMode){
        case "boxEditor":
            drawBoxEditor(stateObject);
            break;
        case "braceletEditor":
            drawBraceletEditor(stateObject);
            break;
    }
}
function updateTxtIn(stateObject){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    if(stateObject.selectedBoxes.size===1){
        var stringToShow = "";
        var theOne = stateObject.selectedBoxes.values().next().value;
        if(box[theOne].parameterName!==null){
            stringToShow += "PARAMETERS:\n";
            var keyLine = "";
            var valueLine = "";
            for(var a=0;a<box[theOne].parameterName.length;a++){
                keyLine += box[theOne].parameterName[a]+";";
                if(box[theOne].parameterSource[a].kind==="derived"){
                    valueLine += "[";
                }
                valueLine += box[theOne].parameterValue[a];
                if(box[theOne].parameterSource[a].kind==="derived"){
                    valueLine += "]";
                }
                valueLine += ";";
            }
            keyLine = keyLine.substring(0,keyLine.length-1)+"\n";
            valueLine = valueLine.substring(0,valueLine.length-1)+"\n";
            stringToShow += keyLine+valueLine;
        }
        if(box[theOne].data[0]!==null){
            stringToShow += "DATA:\n";
            switch(getDetailedType(box[theOne].data[0])){
                case 'array1D':
                    for(var a=0;a<box[theOne].data[0].length;a++){
                        stringToShow += box[theOne].data[0][a]
                        if(a<box[theOne].data[0].length-1){
                            stringToShow += ",";
                        }
                    }
                    stringToShow += "\n";
                    break;
                case 'array2D':
                    for(var a=0;a<box[theOne].data[0].length;a++){
                        for(var b=0;b<box[theOne].data[0][a].length;b++){
                            stringToShow += box[theOne].data[0][a][b]
                            if(b<box[theOne].data[0][a].length-1){
                                stringToShow += ",";
                            }
                        }
                        stringToShow += "\n";
                    }
                    break;
                case 'number':
                    stringToShow += box[theOne].data[0];
                    break;
            }
            
        }
        txtIn.value = stringToShow;
    }
    else{
        txtIn.value = "";
    }
};
function updateTxtOut(stateObject){
    var outString = "menu: "+programState.submenu
    if(stateObject.subprocess!="none"){
        outString += "\nselection: "+programState.subprocess;
    }
    txtOut.value = outString;
}
function interpretMouseCoordinateForBoxEditor(mX,mY){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    if(mY<programState.screenDim.menuTile){
        var whichSquare = Math.floor(mX/programState.screenDim.menuTile);
        if(whichSquare<menuHierarchy["main"].length){
            return {type:"mainMenu",detail:whichSquare};
        }
    }
    if(programState.submenu!="none"){
        if((mY<programState.screenDim.menuTile*2)&&(mY>programState.screenDim.menuTile)&&(mX<menuHierarchy[programState.submenu].length*programState.screenDim.menuTile)){
            var whichSquare = Math.floor(mX/programState.screenDim.menuTile);
            if(whichSquare<menuHierarchy[programState.submenu].length){
                return {type:"submenu",detail:whichSquare};
            }
        }
    }
    for(var a=0;a<box.length;a++){
        if((Math.abs(mX-box[a].x)<programState.screenDim.halfTile)&&(Math.abs(mY-box[a].y)<programState.screenDim.halfTile)){
            if(Math.abs(mX-box[a].x)<programState.screenDim.halfTile-programState.screenDim.xletWidth){
                return {type:"boxBody",box:a};
            }
            else{
                if(mX<box[a].x){
                    return {type:"inlet",box:a,inlet:Math.floor((mY-box[a].y+programState.screenDim.halfTile)/(programState.screenDim.menuTile/box[a].inletCount))};
                }
                else{
                    return {type:"outlet",box:a,outlet:Math.floor((mY-box[a].y+programState.screenDim.halfTile)/(programState.screenDim.menuTile/box[a].outletCount))};
                }
            }
        }
    }
    return {type:"background"};
}
function handleBoxEditorMouseUp(e){
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    var mouseX = e.clientX-cnvs.offsetLeft;
    var mouseY = e.clientY-cnvs.offsetTop;
    var mouseDownResult = interpretMouseCoordinateForBoxEditor(programState.dragFrom.x,programState.dragFrom.y);
    var mouseUpResult = interpretMouseCoordinateForBoxEditor(mouseX,mouseY);
    switch(mouseDownResult.type){
        case "boxBody":
            switch(mouseUpResult.type){
                case "boxBody":
                    if(mouseDownResult.box==mouseUpResult.box){
                        if(e.shiftKey){
                            box[mouseUpResult.box].selected = !box[mouseUpResult.box].selected;
                            if(box[mouseUpResult.box].selected){
                                programState.selectedBoxes.add(mouseUpResult.box);
                            }
                            else{
                                programState.selectedBoxes.delete(mouseUpResult.box);
                            }
                        }
                        else{
                            for(var a=0;a<box.length;a++){
                                box[a].selected = false;
                            }
                            programState.selectedBoxes.clear();
                            box[mouseUpResult.box].selected = true;
                            programState.selectedBoxes.add(mouseUpResult.box);
                        }
                    }
                    else{
                        //Alter to prevent cycles
                        var matchingConnection = connection.findIndex(conn => conn.from.box === mouseDownResult.box && conn.to.box === mouseUpResult.box && conn.from.outlet === mouseDownResult.outlet && conn.to.inlet === mouseUpResult.inlet);
                        if(matchingConnection>-1){
                            connection.splice(matchingConnection,1);
                        }
                        else{
                            connection.push({from:{box:mouseDownResult.box,outlet:mouseDownResult.outlet},to:{box:mouseUpResult.box,inlet:mouseUpResult.inlet}});
                        }
                    }
                    break;
                case "background":
                    if(programState.selectedBoxes.size===1){
                        var theOne = programState.selectedBoxes.values().next().value;
                        box[theOne].x += mouseX-programState.dragFrom.x;
                        box[theOne].y += mouseY-programState.dragFrom.y;
                    }
                    else{
                        //Should only do this moving if the original click was on one of the selected boxes
                        if(box[mouseDownResult.box].selected){
                            for(var a=0;a<box.length;a++){
                                if(box[a].selected){
                                    box[a].x += mouseX-programState.dragFrom.x;
                                    box[a].y += mouseY-programState.dragFrom.y;
                                    box[a].x = Math.min(programState.screenDim.width,Math.max(0,box[a].x));
                                    box[a].y = Math.min(programState.screenDim.height,Math.max(0,box[a].y));
                                }
                            }
                        }
                        else{
                            box[mouseDownResult.box].x += mouseX-programState.dragFrom.x;
                            box[mouseDownResult.box].y += mouseY-programState.dragFrom.y;
                            box[mouseDownResult.box].x = Math.min(programState.screenDim.width,Math.max(0,box[mouseDownResult.box].x));
                            box[mouseDownResult.box].y = Math.min(programState.screenDim.height,Math.max(0,box[mouseDownResult.box].y));
                        }
                    }
                    break;
            }
            break;
        case "background":
            if(programState.subprocess==="none"){
                if(!e.shiftKey){
                    for(var a=0;a<box.length;a++){
                        box[a].selected = false;
                    }
                    programState.selectedBoxes.clear();
                }
                for(var a=0;a<box.length;a++){
                    if(isInRectangle(box[a].x,box[a].y,programState.dragFrom.x,programState.dragFrom.y,mouseX,mouseY)){
                        if(!box[a].selected){
                            box[a].selected = true;
                            programState.selectedBoxes.add(a);
                        }
                    }
                }
            }
            else{
                box[box.length] = new Box(mouseX,mouseY,programState.subprocess);
                if(!e.shiftKey){
                    programState.subprocess = "none";
                }
            }
            break;
        case "inlet":
            switch(mouseUpResult.type){
                case "outlet":
                    tryToAddRemoveConnection(mouseUpResult.box,mouseUpResult.outlet,mouseDownResult.box,mouseDownResult.inlet);
                    break;
            }
            break;
        case "mainMenu":
            if(mouseDownResult.detail!=menuHierarchy["main"].length-1){
                programState.submenu = menuHierarchy["main"][mouseDownResult.detail];
            }
            else{
                programState.submenu = "none";
                programState.subprocess = "none";
            }
            break;
        case "outlet":
            switch(mouseUpResult.type){
                case "inlet":
                    tryToAddRemoveConnection(mouseDownResult.box,mouseDownResult.outlet,mouseUpResult.box,mouseUpResult.inlet);
                    break;
            }
            break;
        case "submenu":
            if(mouseUpResult.type==="background"){
                box[box.length] = new Box(mouseX,mouseY,menuHierarchy[programState.submenu][mouseDownResult.detail]);
            }
            else{
                programState.subprocess = menuHierarchy[programState.submenu][mouseDownResult.detail];
            }
            break;
    }
}

cnvs.addEventListener('keydown', (e) => {
    const box = programState.graphRegistry.get(programState.graphToDisplay).box;
    const connection = programState.graphRegistry.get(programState.graphToDisplay).connection;
    e.preventDefault();
    if(((e.key==="c")||(e.key==="x"))&&(e.ctrlKey)){
        if(programState.selectedBoxes.size>0){
            programState.canvasClipboard.nthCopy = 0;
            programState.canvasClipboard.content = [];
            programState.canvasClipboard.x = programState.screenDim.width;
            programState.canvasClipboard.y = programState.screenDim.height;
            var lowestTopLeftness = programState.canvasClipboard.x+programState.canvasClipboard.y;
            for(var a=0;a<box.length;a++){
                if(box[a].selected){
                    if(box[a].x+box[a].y<lowestTopLeftness){
                        programState.canvasClipboard.x = box[a].x;
                        programState.canvasClipboard.y = box[a].y;
                        lowestTopLeftness = box[a].x+box[a].y;
                    }
                    programState.canvasClipboard.content.push(structuredClone(box[a]));
                }
            }
            programState.canvasClipboard.relativePosition = [];
            for(var a=0;a<box.length;a++){
                if(box[a].selected){
                    programState.canvasClipboard.relativePosition.push({x:box[a].x-programState.canvasClipboard.x,y:box[a].y-programState.canvasClipboard.y});
                }
            }
            if(e.key==="x"){
                for(var a=0;a<box.length;a++){
                    if(box[a].selected){
                        box.splice(a,1);
                        a--;
                    }
                }
                programState.canvasClipboard.nthCopy = -1;
                redraw();
            }
        }
    }
    if((e.key==="g")&&(e.ctrlKey)){
        programState.graphRegistry.set(programState.nextGraphID, new Graph(programState.nextGraphID, `user${programState.nextGraphID}`));
        var visibleGraph = programState.graphRegistry.get(programState.graphToDisplay);
        var graphBeingDefined = programState.graphRegistry.get(programState.nextGraphID);
        var boxTranslate = new Map();
        programState.selectedBoxes.forEach((val) => {
            var referencedBox = visibleGraph.box[val];
            boxTranslate.set(val, graphBeingDefined.box.length);
            graphBeingDefined.box.push(structuredClone(referencedBox));
        });
        visibleGraph.connection.forEach(conn => {
            if(programState.selectedBoxes.has(conn.from.box) && programState.selectedBoxes.has(conn.to.box)){
                graphBeingDefined.connection.push({
                    from: {box: boxTranslate.get(conn.from.box), outlet: conn.from.outlet},
                    to: {box: boxTranslate.get(conn.to.box), inlet: conn.to.inlet}
                });
            }
            if (!programState.selectedBoxes.has(conn.from.box) && programState.selectedBoxes.has(conn.to.box)) {
                graphBeingDefined.inputPorts.push({
                    name: `in${graphBeingDefined.inputPorts.length}`,
                    internalNode: boxTranslate.get(conn.to.box),
                    internalInlet: conn.to.inlet
                });
            }
            if (programState.selectedBoxes.has(conn.from.box) && !programState.selectedBoxes.has(conn.to.box)) {
                graphBeingDefined.outputPorts.push({
                    name: `out${graphBeingDefined.outputPorts.length}`,
                    internalNode: boxTranslate.get(conn.from.box),
                    internalOutlet: conn.from.outlet
                });
            }
        });
        var totalX = 0; var totalY = 0; 
        var selectedIndices = Array.from(programState.selectedBoxes);
        selectedIndices.forEach((val) => {
            totalX += visibleGraph.box[val].x;
            totalY += visibleGraph.box[val].y;
        });
        var centerX = totalX / selectedIndices.length;
        var centerY = totalY / selectedIndices.length;
        var connectionTranslate = new Map();
        var remainingIndices = [];
        var newIndex = 0;
        for (var i = 0; i < visibleGraph.box.length; i++) {
            if (!programState.selectedBoxes.has(i)) {
                connectionTranslate.set(i, newIndex);
                remainingIndices.push(i);
                newIndex++;
            }
        }
        var newBoxIndex = newIndex;
        var newConnections = [];
        visibleGraph.connection.forEach(conn => {
            const fromSelected = programState.selectedBoxes.has(conn.from.box);
            const toSelected = programState.selectedBoxes.has(conn.to.box);
            if (!fromSelected && !toSelected) {
                newConnections.push({
                    from: {box: connectionTranslate.get(conn.from.box), outlet: conn.from.outlet},
                    to: {box: connectionTranslate.get(conn.to.box), inlet: conn.to.inlet}
                });
            } else if (!fromSelected && toSelected) {
                var inputPortIndex = graphBeingDefined.inputPorts.findIndex(port => 
                    port.internalNode === boxTranslate.get(conn.to.box) && 
                    port.internalInlet === conn.to.inlet
                );
                if (inputPortIndex !== -1) {
                    newConnections.push({
                        from: {box: connectionTranslate.get(conn.from.box), outlet: conn.from.outlet},
                        to: {box: newBoxIndex, inlet: inputPortIndex}
                    });
                }
            } else if (fromSelected && !toSelected) {
                var outputPortIndex = graphBeingDefined.outputPorts.findIndex(port => 
                    port.internalNode === boxTranslate.get(conn.from.box) && 
                    port.internalOutlet === conn.from.outlet
                );
                if (outputPortIndex !== -1) {
                    newConnections.push({
                        from: {box: newBoxIndex, outlet: outputPortIndex},
                        to: {box: connectionTranslate.get(conn.to.box), inlet: conn.to.inlet}
                    });
                }
            }
        });
        var newBoxes = [];
        remainingIndices.forEach(oldIdx => {
            newBoxes.push(visibleGraph.box[oldIdx]);
        });
        newBoxes.push(new Box(centerX, centerY, programState.nextGraphID));
        newBoxes[newBoxes.length - 1].selected = true;
        visibleGraph.box = newBoxes;
        visibleGraph.connection = newConnections;
        programState.selectedBoxes.clear();
        programState.selectedBoxes.add(newBoxIndex);
        menuHierarchy.userProcess.push(programState.nextGraphID);
        programState.nextGraphID++;
    }
    if((e.key==="i")&&(e.ctrlKey)){
        if(programState.selectedBoxes.size===1){
            var selectedBoxIndex = programState.selectedBoxes.values().next().value;
            var selectedBox = programState.graphRegistry.get(programState.graphToDisplay).box[selectedBoxIndex];
            if(typeof selectedBox.kind === "number"){
                programState.graphToDisplay = selectedBox.kind;
            }
            else {
                programState.graphToDisplay = 0;
            }
        }
        else{
            programState.graphToDisplay = 0;
        }
    }
    if((e.key==="r")&&(e.ctrlKey)){
        if(programState.selectedBoxes.size===1){
            var boxReference = programState.graphRegistry.get(programState.graphToDisplay).box[programState.selectedBoxes.values().next().value];
            if(typeof boxReference.kind === "number"){
                programState.graphRegistry.get(boxReference.kind).randomSymbol();
            }
        }
    }
    if((e.key==="v")&&(e.ctrlKey)){
        if(programState.canvasClipboard.content.length>0){
            for(var a=0;a<box.length;a++){
                box[a].selected = false;
            }
            programState.canvasClipboard.nthCopy += 1;
            for(var a=0;a<programState.canvasClipboard.content.length;a++){
                box.push(structuredClone(programState.canvasClipboard.content[a]));
                box[box.length-1].x = programState.canvasClipboard.nthCopy*programState.screenDim.menuTile/2+programState.canvasClipboard.relativePosition[a].x+programState.canvasClipboard.x;
                box[box.length-1].y = programState.canvasClipboard.nthCopy*programState.screenDim.menuTile/2+programState.canvasClipboard.relativePosition[a].y+programState.canvasClipboard.y;
            }
            redraw(programState);
        }
    }    
    if(e.key==="Tab"){
        switch(programState.screenMode){
            case "boxEditor":
                programState.screenMode = "braceletEditor";
                break;
            case "braceletEditor":
                programState.screenMode = "boxEditor";
                break;
        }
    }
    redraw(programState);
    updateTxtIn(programState);
    updateTxtOut(programState);
});
